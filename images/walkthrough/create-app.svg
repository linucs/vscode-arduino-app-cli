<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="200" fill="#1e1e1e" rx="8"/>
  <text x="150" y="34" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#d4d4d4">New App</text>
  <!-- App card -->
  <rect x="40" y="50" width="220" height="120" rx="8" fill="#252526" stroke="#454545" stroke-width="1"/>
  <!-- Python half -->
  <rect x="56" y="68" width="86" height="84" rx="6" fill="#2d2d2d" stroke="#3776ab" stroke-width="1.5"/>
  <text x="99" y="92" text-anchor="middle" font-size="9" font-family="monospace" fill="#3776ab">python/</text>
  <text x="99" y="108" text-anchor="middle" font-size="9" font-family="monospace" fill="#8b8b8b">main.py</text>
  <rect x="66" y="120" width="66" height="5" rx="2" fill="#555"/>
  <rect x="66" y="132" width="50" height="5" rx="2" fill="#555"/>
  <!-- C++ half -->
  <rect x="158" y="68" width="86" height="84" rx="6" fill="#2d2d2d" stroke="#00979d" stroke-width="1.5"/>
  <text x="201" y="92" text-anchor="middle" font-size="9" font-family="monospace" fill="#00979d">sketch/</text>
  <text x="201" y="108" text-anchor="middle" font-size="9" font-family="monospace" fill="#8b8b8b">sketch.ino</text>
  <rect x="168" y="120" width="66" height="5" rx="2" fill="#555"/>
  <rect x="168" y="132" width="50" height="5" rx="2" fill="#555"/>
  <text x="150" y="190" text-anchor="middle" font-size="9" font-family="sans-serif" fill="#8b8b8b">Python + C++ in one app</text>
</svg>
